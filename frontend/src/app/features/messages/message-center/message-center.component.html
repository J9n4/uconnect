<div class="messages-layout">
  
  <!-- Columna Izquierda: Lista de Chats -->
  <aside class="chat-sidebar">
    <div class="sidebar-header">
      <h2>Mensajes</h2>
      <div class="search-bar">
        <lucide-icon [img]="SearchIcon" class="icon-sm"></lucide-icon>
        <input type="text" placeholder="Buscar contacto..." [(ngModel)]="searchTerm" (input)="filterChats()">
      </div>
    </div>

    <div class="chat-list">
      <div 
        class="chat-item" 
        *ngFor="let chat of chats" 
        [class.active]="activeChat?.id === chat.id"
        (click)="selectChat(chat.id)">
        
        <div class="avatar">
          <img [src]="chat.avatar" alt="Avatar" class="avatar-img">
        </div>
        
        <div class="chat-info">
          <div class="chat-header">
            <h4>{{ chat.name }}</h4>
            <span class="badge" *ngIf="chat.unread > 0">{{ chat.unread }}</span>
          </div>
          <p class="role-text">{{ chat.role }}</p>
          <p class="last-message">{{ chat.lastMessage }}</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Columna Derecha: Hilo del Chat -->
  <main class="chat-window" *ngIf="activeChat; else noActiveChat">
    
    <!-- Cabecera del Chat Activo -->
    <header class="chat-header-bar">
      <div class="avatar">
        <img [src]="activeChat.avatar" alt="Avatar" class="avatar-img">
      </div>
      <div>
        <h3>{{ activeChat.name }}</h3>
        <span class="status">En línea</span>
      </div>
    </header>

    <!-- Área de Burbujas de Mensaje -->
    <div class="chat-messages">
      <ng-container *ngFor="let msg of activeChat.messages">
        <!-- Mensaje de Sistema -->
        <div *ngIf="msg.sender === 'system'" class="system-message-container">
          <div class="system-message-bubble">
            <span>{{ msg.text }}</span>
          </div>
        </div>

        <!-- Burbujas de chat normales -->
        <div 
          *ngIf="msg.sender !== 'system'"
          class="message-bubble" 
          [ngClass]="msg.sender === 'me' ? 'sent' : 'received'">
          <div class="bubble-content">
            <p>{{ msg.text }}</p>
            <span class="time">{{ msg.time }}</span>
          </div>
        </div>
      </ng-container>
    </div>

    <!-- Input para Enviar -->
    <div class="chat-input-area">
      <input 
        type="text" 
        placeholder="Escribe un mensaje..." 
        [(ngModel)]="newMessage" 
        (keyup.enter)="sendMessage()">
      <button class="btn-send" (click)="sendMessage()" [disabled]="!newMessage.trim()">
        <lucide-icon [img]="SendIcon"></lucide-icon>
      </button>
    </div>

  </main>

  <!-- Template si no hay chat seleccionado -->
  <ng-template #noActiveChat>
    <main class="chat-window no-chat-selected">
      <div class="no-chat-box">
        <lucide-icon [img]="UserIcon" class="no-chat-icon"></lucide-icon>
        <h3>Bandeja de Entrada</h3>
        <p>Elige un contacto en la lista para ver su conversación.</p>
      </div>
    </main>
  </ng-template>

</div>
