<div class="login-bg" aria-label="Pantalla de inicio de sesión">
  <div class="login-shell">
    <div class="login-hero">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">U</div>
        <div class="brand-text">
          <div class="brand-title">UConnect</div>
          <div class="brand-subtitle">Acceso seguro al campus</div>
        </div>
      </div>

      <div class="hero-badges" aria-hidden="true">
        <span class="badge">⚡ Rápido</span>
        <span class="badge">🔒 Seguro</span>
        <span class="badge">✨ Moderno</span>
      </div>

      <p class="hero-copy">
        Inicia sesión con tu correo institucional para acceder a tu panel.
      </p>
    </div>

    <form class="login-card" (ngSubmit)="login()" #formRef="ngForm">
      <div class="card-head">
        <h1>Bienvenido</h1>
        <p>Introduce tus credenciales</p>
      </div>

      <div class="field">
        <label for="email">Correo institucional</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="username"
          [(ngModel)]="email"
          placeholder="tucorreo@univer.edu"
          required
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          [(ngModel)]="password"
          placeholder="••••••••"
          required
        />
      </div>

      <div class="row">
        <label class="check">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          <span>Recordarme</span>
        </label>

        <a class="link" href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <div class="alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn" [disabled]="loading || formRef.invalid">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading" class="spinner" aria-hidden="true"></span>
      </button>

      <div class="fineprint">
        Al continuar, aceptas los términos y políticas del sistema.
      </div>
    </form>
  </div>
</div>
